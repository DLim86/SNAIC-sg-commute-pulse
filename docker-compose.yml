services:

  pipeline:
    build: .
    command:
      - sh
      - -c
      - |
        python scripts/schema.py &&
        python scripts/model.py --train &&
        while true; do
          python scripts/ingest.py &&
          python scripts/transform.py &&
          python scripts/model.py --predict &&
          python scripts/model.py --backfill
          sleep 1800
        done
    volumes:
      - db_data:/app/db
      - ./data:/app/data
      - ./models:/app/models
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    restart: unless-stopped

  api:
    build: .
    command: uvicorn scripts.api:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/db
    restart: unless-stopped

  dashboard:
    build: .
    command:
      - streamlit
      - run
      - scripts/serve.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    ports:
      - "8501:8501"
    volumes:
      - db_data:/app/db
    restart: unless-stopped

volumes:
  db_data:
